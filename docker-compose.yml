# docker-compose.yml
# Si estoy utilizando Railway, este aarchivo no es necesario
# Solo si uso Docker localmente o en otro servidor sin Railway
version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - MONGO_URL=mongodb://mongo:27017/t11 # Esto es la cadena de conexión completa, incluyendo el nombre de la base de datos al final
      - DB_NAME=t11
      # Es importante no escribir el secreto nunca en ningún sitio
      # Salvo en el .env, en Railway => Project Settings => Shared Variables
      # Y en GitHub Actions => Secrets => New Repository Secret
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo
    volumes:
      - .:/app
      - /app/node_modules
    command: npm start

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
